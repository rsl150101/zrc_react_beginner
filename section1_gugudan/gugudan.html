<!DOCTYPE html>
<html lang="en">
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    "use strict";
    const domNode = document.getElementById("root");
    const root = ReactDOM.createRoot(domNode);
    class GuGuDan extends React.Component {
      constructor(props) {
        super(props);
        this.state = {
          firstNum: Math.ceil(Math.random() * 9),
          secondNum: Math.ceil(Math.random() * 9),
          inputNum: "",
          result: "",
        };
      }

      handleInputChange = (e) => {
        this.setState({ inputNum: e.target.value });
      };

      handleGuGuDanFormSubmit = (e) => {
        e.preventDefault();
        if (this.state.inputNum === "") {
          this.inputRef.focus();
          return;
        }
        if (
          parseInt(this.state.inputNum) ===
          this.state.firstNum * this.state.secondNum
        ) {
          this.setState({
            firstNum: Math.ceil(Math.random() * 9),
            secondNum: Math.ceil(Math.random() * 9),
            result: "Correct!",
            inputNum: "",
          });
        } else {
          this.setState({
            result: "Wrong!",
            inputNum: "",
          });
        }
        this.inputRef.focus();
      };

      inputRef;

      handleInputRef = (cur) => {
        console.log(cur);

        this.inputRef = cur;
      };

      render() {
        return (
          <>
            <h2>
              {this.state.firstNum} X {this.state.secondNum} = ?
            </h2>
            <form onSubmit={this.handleGuGuDanFormSubmit}>
              <input
                type="number"
                value={this.state.inputNum}
                onChange={this.handleInputChange}
                ref={this.handleInputRef}
              />
              <button>Submit</button>
            </form>
            <h3>{this.state.result}</h3>
          </>
        );
      }
    }
    root.render(<GuGuDan />);
  </script>
</html>
