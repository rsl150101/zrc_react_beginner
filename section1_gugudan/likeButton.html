<!DOCTYPE html>
<html lang="en">
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script>
    "use strict";
    // 기존의 React 작성 방식
    const domNode = document.getElementById("root");
    const root = ReactDOM.createRoot(domNode); // React v18 에서 기존의 render 은 createRoot로 대체되었다.
    const e = React.createElement;
    // React Hook 도입 이전에는 class 로 컴포넌트 작성
    class LikeButton extends React.Component {
      constructor(props) {
        super(props);
        this.state = { liked: false };
      }

      render() {
        if (this.state.liked) {
          return "You liked this.";
        }
        return e(
          "button",
          { onClick: () => this.setState({ liked: true }) },
          "Like"
        );
      }
    }
    root.render(e(LikeButton), domNode); // React v18 에서 render 방식
  </script>
</html>
